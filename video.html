.day-group-header .day-label { font-size: 0.82rem; font-weight: 700; color: #444; }
.day-group-header .day-count { font-size: 0.72rem; color: #999; }
.day-group-body { display: none; }

.playlist-scroll::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

// 扁平化所有视频（附上分组信息）
let allVideos = [];
days.forEach((day, di) => {
  day.videos.forEach((v, vi) => {
    allVideos.push({ ...v, dayIdx: di, vidIdx: vi, dayLabel: day.label });
  });
});
const totalCount = allVideos.length;

// ===== DOM 引用 =====
const playlistScroll = document.getElementById('playlistScroll');
const playlistCount = document.getElementById('playlistCount');
const biliPlayer = document.getElementById('biliPlayer');
const playingTitle = document.getElementById('playingTitle');
const playingDesc = document.getElementById('playingDesc');

playlistCount.textContent = `共 ${totalCount} 集`;

// ===== 渲染 =====
function renderPlaylist(filterText) {
  playlistScroll.innerHTML = '';
  const ft = (filterText || '').toLowerCase();

  days.forEach((day, di) => {
    // 过滤
    const matched = ft
      ? day.videos.filter(v => v.title.toLowerCase().includes(ft) || v.num.toLowerCase().includes(ft) || day.label.toLowerCase().includes(ft))
      : day.videos;
    if (!matched.length) return;

    const group = document.createElement('div');
    group.className = 'day-group open';

    const header = document.createElement('div');
    header.className = 'day-group-header';
    header.innerHTML = `<span class="arrow">▶</span><span class="day-label">${day.label}</span><span class="day-count">(${matched.length}集)</span>`;
    header.onclick = () => group.classList.toggle('open');

    const body = document.createElement('div');
    body.className = 'day-group-body';

    day.videos.forEach((v, vi) => {
      if (ft && !v.title.toLowerCase().includes(ft) && !v.num.toLowerCase().includes(ft) && !day.label.toLowerCase().includes(ft)) return;
      const globalIdx = allVideos.findIndex(av => av.dayIdx === di && av.vidIdx === vi);
      const item = document.createElement('div');
      item.className = 'vid-item';
      if (globalIdx === 0) item.classList.add('active');
      item.onclick = () => switchVideo(globalIdx);
      item.innerHTML = `
        <div class="vid-num">${v.num}</div>
        <div class="vid-info">
          <div class="vid-title">${v.title}</div>
          <div class="vid-duration">⏱ ${v.dur}</div>
        </div>`;
      body.appendChild(item);
    });

    group.appendChild(header);
    group.appendChild(body);
    playlistScroll.appendChild(group);
  });
}

function switchVideo(index) {
  const v = allVideos[index];
  const bvid = v.bvid || DEFAULT_BVID;
  const page = v.page || 1;
  biliPlayer.src = `//player.bilibili.com/player.html?bvid=${bvid}&page=${page}&high_quality=1`;
  playingTitle.textContent = `📺 ${v.dayLabel.split('·')[0].trim()} - ${v.title}`;
  playingDesc.textContent = v.dayLabel + '  |  ⏱ ' + v.dur;
  // 更新高亮
  document.querySelectorAll('.vid-item').forEach((el, i) => el.classList.toggle('active', i === index));
}

function filterPlaylist() {
  const ft = document.getElementById('searchInput').value;
  renderPlaylist(ft);
}

// ===== 初始化 =====
renderPlaylist();

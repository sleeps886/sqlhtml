<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B站 DBA 视频课程播放页</title>
<style>
:root {
  --bg: #f5f7fb;
  --panel: #ffffff;
  --text: #202532;
  --muted: #687184;
  --line: #e6eaf2;
  --primary: #1f7ae0;
  --primary-dark: #155fb2;
  --sidebar: #151b28;
  --sidebar-2: #20293b;
  --sidebar-text: #dce5f5;
  --shadow: 0 10px 30px rgba(31, 53, 85, 0.12);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.app {
  display: grid;
  grid-template-columns: 248px minmax(0, 1fr);
  min-height: 100vh;
}

.sidebar {
  background: var(--sidebar);
  color: var(--sidebar-text);
  padding: 24px 18px;
}

.brand {
  padding: 4px 8px 22px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.brand h1 {
  margin: 0;
  font-size: 20px;
  line-height: 1.3;
  letter-spacing: 0;
}

.brand p {
  margin: 8px 0 0;
  color: #9aa8bd;
  font-size: 13px;
}

.nav {
  display: grid;
  gap: 8px;
  margin-top: 20px;
}

.nav a {
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 40px;
  padding: 9px 12px;
  color: var(--sidebar-text);
  text-decoration: none;
  border-radius: 8px;
  font-size: 14px;
}

.nav a:hover,
.nav a.active {
  background: var(--sidebar-2);
  color: #ffffff;
}

.main {
  padding: 24px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-start;
  margin-bottom: 18px;
}

.title-block h2 {
  margin: 0;
  font-size: 24px;
  line-height: 1.3;
}

.title-block p {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 14px;
}

.open-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 38px;
  padding: 0 14px;
  border-radius: 8px;
  background: var(--primary);
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  white-space: nowrap;
}

.open-link:hover {
  background: var(--primary-dark);
}

.player-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 380px;
  gap: 20px;
  align-items: start;
}

.player-card,
.playlist-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.player-card {
  overflow: hidden;
}

.player-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #000;
}

.player-wrap iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
}

.now-playing {
  padding: 16px 18px 18px;
  border-top: 1px solid var(--line);
}

.now-playing .eyebrow {
  color: var(--primary);
  font-size: 13px;
  font-weight: 700;
}

.now-playing h3 {
  margin: 6px 0 8px;
  font-size: 18px;
}

.now-playing p {
  margin: 0;
  color: var(--muted);
  font-size: 13px;
}

.playlist-card {
  overflow: hidden;
  position: sticky;
  top: 20px;
}

.playlist-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
}

.playlist-head h3 {
  margin: 0;
  font-size: 16px;
}

.playlist-head p {
  margin: 5px 0 0;
  color: var(--muted);
  font-size: 12px;
}

.tools {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
}

.tools input,
.tools select {
  height: 36px;
  border: 1px solid var(--line);
  border-radius: 7px;
  padding: 0 10px;
  font: inherit;
  color: var(--text);
  background: #fff;
  outline: none;
}

.tools input:focus,
.tools select:focus {
  border-color: var(--primary);
}

.playlist {
  max-height: calc(100vh - 214px);
  overflow: auto;
}

.video-item {
  display: grid;
  grid-template-columns: 52px minmax(0, 1fr);
  gap: 10px;
  width: 100%;
  padding: 11px 16px;
  border: 0;
  border-bottom: 1px solid #f0f3f8;
  background: #fff;
  color: var(--text);
  text-align: left;
  cursor: pointer;
  font: inherit;
}

.video-item:hover {
  background: #f7faff;
}

.video-item.active {
  background: #eaf3ff;
  border-left: 4px solid var(--primary);
  padding-left: 12px;
}

.video-index {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 30px;
  border-radius: 7px;
  background: #eef2f7;
  color: #516071;
  font-size: 12px;
  font-weight: 700;
}

.video-item.active .video-index {
  background: var(--primary);
  color: #fff;
}

.video-title {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 14px;
  font-weight: 650;
}

.video-meta {
  margin-top: 3px;
  color: var(--muted);
  font-size: 12px;
}

.empty {
  padding: 28px 16px;
  color: var(--muted);
  text-align: center;
  font-size: 14px;
}

@media (max-width: 1180px) {
  .player-layout {
    grid-template-columns: 1fr;
  }

  .playlist-card {
    position: static;
  }

  .playlist {
    max-height: 520px;
  }
}

@media (max-width: 760px) {
  .app {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: static;
  }

  .main {
    padding: 16px;
  }

  .topbar {
    display: grid;
  }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <h1>SQL / DBA 学习站</h1>
      <p>课程视频、资料和练习统一入口</p>
    </div>
    <nav class="nav">
      <a href="index.html">项目概览</a>
      <a href="index.html#tasks">教程章节</a>
      <a href="index.html#gallery">图片资源</a>
      <a href="index.html#files">文件结构</a>
      <a href="video.html" class="active">视频教程</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="title-block">
        <h2>DBA 数据库运维课程播放列表</h2>
        <p>使用 B 站官方播放器嵌入播放，右侧列表支持搜索和快速跳转。</p>
      </div>
      <a class="open-link" href="https://www.bilibili.com/video/BV15J41167Wp/" target="_blank" rel="noopener">在 B 站打开</a>
    </div>

    <div class="player-layout">
      <section class="player-card">
        <div class="player-wrap">
          <iframe
            id="biliPlayer"
            src="https://player.bilibili.com/player.html?bvid=BV15J41167Wp&p=1&autoplay=0"
            title="Bilibili video player"
            scrolling="no"
            allowfullscreen="true"
            referrerpolicy="no-referrer-when-downgrade">
          </iframe>
        </div>
        <div class="now-playing">
          <div class="eyebrow" id="nowMeta">正在播放 第 1 集 / 共 295 集</div>
          <h3 id="nowTitle">第 001 集</h3>
          <p>当前页面只嵌入 B 站官方播放器，不抓取和存储视频源文件。</p>
        </div>
      </section>

      <aside class="playlist-card">
        <div class="playlist-head">
          <h3>播放列表</h3>
          <p id="playlistSummary">共 295 集，当前第 1 集</p>
        </div>
        <div class="tools">
          <input id="searchInput" type="search" placeholder="搜索集数，例如 17 或 授权">
          <select id="jumpSelect" aria-label="快速跳转">
            <option value="1">从第 1 集开始</option>
            <option value="50">跳到第 50 集</option>
            <option value="100">跳到第 100 集</option>
            <option value="150">跳到第 150 集</option>
            <option value="200">跳到第 200 集</option>
            <option value="250">跳到第 250 集</option>
          </select>
        </div>
        <div class="playlist" id="playlist"></div>
      </aside>
    </div>
  </main>
</div>

<script>
const BVID = 'BV15J41167Wp';
const TOTAL = 295;

const knownTitles = {
  1: 'day01-1 讲师简介和 DBA 行业认识',
  17: '用户授权',
  18: '权限回收及面试问题'
};

const videos = Array.from({ length: TOTAL }, (_, index) => {
  const page = index + 1;
  return {
    page,
    title: knownTitles[page] || `第 ${String(page).padStart(3, '0')} 集`
  };
});

let currentPage = 1;

const player = document.getElementById('biliPlayer');
const playlist = document.getElementById('playlist');
const searchInput = document.getElementById('searchInput');
const jumpSelect = document.getElementById('jumpSelect');
const nowMeta = document.getElementById('nowMeta');
const nowTitle = document.getElementById('nowTitle');
const playlistSummary = document.getElementById('playlistSummary');

function playerUrl(page) {
  return `https://player.bilibili.com/player.html?bvid=${BVID}&p=${page}&autoplay=0`;
}

function play(page) {
  currentPage = page;
  const video = videos[page - 1];
  player.src = playerUrl(page);
  nowMeta.textContent = `正在播放 第 ${page} 集 / 共 ${TOTAL} 集`;
  nowTitle.textContent = video.title;
  playlistSummary.textContent = `共 ${TOTAL} 集，当前第 ${page} 集`;
  renderList(searchInput.value);
}

function renderList(keyword = '') {
  const value = keyword.trim().toLowerCase();
  const matched = videos.filter(video => {
    return !value ||
      String(video.page).includes(value) ||
      video.title.toLowerCase().includes(value);
  });

  playlist.innerHTML = '';

  if (!matched.length) {
    playlist.innerHTML = '<div class="empty">没有找到匹配的视频</div>';
    return;
  }

  const fragment = document.createDocumentFragment();
  matched.forEach(video => {
    const button = document.createElement('button');
    button.type = 'button';
    button.className = `video-item${video.page === currentPage ? ' active' : ''}`;
    button.innerHTML = `
      <span class="video-index">P${video.page}</span>
      <span>
        <span class="video-title">${video.title}</span>
        <span class="video-meta">BV15J41167Wp · 第 ${video.page} 集</span>
      </span>
    `;
    button.addEventListener('click', () => play(video.page));
    fragment.appendChild(button);
  });

  playlist.appendChild(fragment);
}

searchInput.addEventListener('input', () => renderList(searchInput.value));
jumpSelect.addEventListener('change', event => {
  play(Number(event.target.value));
  playlist.scrollTop = 0;
});

renderList();
</script>
</body>
</html>
